server:
  port: 8080

app:
  openai-key: ${OPENAI_API_KEY:}
  openai-api-url: ${OPENAI_API_URL:https://api.openai.com/v1/chat/completions}
  openai-model: ${OPENAI_MODEL:gpt-4.1-mini}
  openai-max-tokens: ${OPENAI_MAX_TOKENS:1500}
  openai-temperature: ${OPENAI_TEMPERATURE:0.3}

spring:
  datasource:
    url: jdbc:h2:file:./data/homestudenttester;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
