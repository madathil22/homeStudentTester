server:
  port: 8080

app:
  admin-token: ${ADMIN_TOKEN:test-admin}
  test-token: ${TEST_TOKEN:test-paper}

spring:
  datasource:
    url: jdbc:h2:file:./data/homestudenttester;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
