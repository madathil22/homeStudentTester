server:
  port: 8080

app:
  openai-key: ${OPENAI_API_KEY:}
  openai-api-url: ${OPENAI_API_URL:https://api.openai.com/v1/responses}
  openai-model: ${OPENAI_MODEL:gpt-5.4-mini}
  openai-fallback-model: ${OPENAI_FALLBACK_MODEL:gpt-5.5}
  openai-max-output-tokens: ${OPENAI_MAX_OUTPUT_TOKENS:8000}
  openai-reasoning-effort: ${OPENAI_REASONING_EFFORT:low}
  openai-store: ${OPENAI_STORE:false}
  admin-password: ${ADMIN_PASSWORD:}
  test-link-colors:
    - amber
    - blue
    - coral
    - green
    - indigo
    - silver
  test-link-animals:
    - fox
    - otter
    - panda
    - robin
    - tiger
    - whale

spring:
  datasource:
    url: jdbc:h2:file:./data/homestudenttester;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
