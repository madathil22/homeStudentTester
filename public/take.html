<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Take Test</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <main class="shell narrow">
      <header class="topbar">
        <div>
          <p class="eyebrow">Student Test</p>
          <h1 id="testTitle">Loading...</h1>
        </div>
      </header>

      <form id="testForm" class="panel">
        <label class="field">
          <span>Name</span>
          <input id="studentName" name="studentName" autocomplete="name" required>
        </label>
        <div id="testContent" class="preview"></div>
        <button class="button" type="submit">Submit answers</button>
        <p id="submitStatus" class="status"></p>
      </form>
    </main>
    <script src="/public/take.js" type="module"></script>
  </body>
</html>
