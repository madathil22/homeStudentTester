<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>homeStudentTester Admin</title>
    <link rel="stylesheet" href="/public/styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Parent Console</p>
          <h1>homeStudentTester</h1>
        </div>
        <a class="button quiet" href="#results">Results</a>
      </header>

      <section class="panel">
        <div class="section-heading">
          <h2>Question Bank</h2>
          <button id="loadSampleTest" class="button secondary" type="button">Load sample</button>
        </div>
        <textarea id="questionMarkdown" spellcheck="false" placeholder="# Grade 4 ELA Practice Test"></textarea>
        <div class="actions">
          <button id="saveTest" class="button" type="button">Preview and activate</button>
          <button id="clearSubmissions" class="button danger" type="button">Clear submissions</button>
        </div>
        <p id="testStatus" class="status"></p>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>Active Test</h2>
          <a id="studentLink" class="button secondary" href="#" target="_blank" rel="noreferrer">Open student link</a>
        </div>
        <div id="preview" class="preview empty">No active test yet.</div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>Answer Bank</h2>
          <button id="loadSampleAnswers" class="button secondary" type="button">Load sample</button>
        </div>
        <textarea id="answerMarkdown" spellcheck="false" placeholder="# Answer Bank"></textarea>
        <div class="actions">
          <button id="saveAnswers" class="button" type="button">Save answer bank</button>
          <button id="scoreSubmissions" class="button secondary" type="button">Score objective answers</button>
        </div>
        <p id="answerStatus" class="status"></p>
      </section>

      <section id="results" class="panel">
        <div class="section-heading">
          <h2>Submissions</h2>
          <button id="refreshResults" class="button secondary" type="button">Refresh</button>
        </div>
        <div id="resultsList" class="results empty">No submissions yet.</div>
      </section>

      <section class="panel">
        <div class="section-heading">
          <h2>GPT Review Text</h2>
          <button id="copyGptText" class="button secondary" type="button">Copy text</button>
        </div>
        <textarea id="gptText" class="plain-output" readonly placeholder="Student submissions will appear here as copy-ready plain text."></textarea>
        <p id="copyStatus" class="status"></p>
      </section>
    </main>
    <script src="/public/admin.js" type="module"></script>
  </body>
</html>
